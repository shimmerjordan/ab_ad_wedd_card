<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>阿丹阿炳婚礼请柬</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/fusion-pixel-12px-proportional-sc@latest/index.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/fusion-pixel-12px-proportional-sc@latest/chinese-simplified.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<canvas id="game"></canvas>

<!-- 标题屏 -->
<div id="title">
  <div class="stars" id="titleStars"></div>
  <h1 id="tNames">新郎 ♥ 新娘</h1>
  <div class="sub">— 星露谷婚礼 · 互动请帖 —</div>
  <div id="guestHello"></div>
  <div class="pick">▼ 选择你要扮演的角色 ▼</div>
  <div class="char-row">
    <div class="char-card" id="pickGroom"><canvas width="16" height="32"></canvas><div class="nm" id="pickGroomNm">新郎</div></div>
    <div class="char-card" id="pickBride"><canvas width="16" height="32"></canvas><div class="nm" id="pickBrideNm">新娘</div></div>
  </div>
  <button class="sdv-btn ghost" id="skipBtn">不想玩游戏？直接查看请帖 »</button>
  <div class="tip">手机：左侧摇杆移动 · A 互动 · B 跳跃<br>电脑：方向键/WASD 移动 · 空格/E 互动 · X 跳跃</div>
</div>

<!-- 入口选择（默认先出现，低调奢华） -->
<div id="gate">
  <div class="gate-card">
    <div class="gate-kicker">WEDDING&nbsp;&nbsp;INVITATION</div>
    <div class="gate-names" id="gateNames">新郎 &amp; 新娘</div>
    <div class="gate-rule"><span>❦</span></div>
    <div class="gate-q">请选择你的入场方式</div>
    <button class="gate-btn" id="gate18">
      <span class="gb-main">我是 18 岁</span>
      <span class="gb-sub">（以及自我认知 18 岁）· 进入可可爱爱请帖</span>
    </button>
    <button class="gate-btn alt" id="gateOld">
      <span class="gb-main">我是老登</span>
      <span class="gb-sub">（不再是小屁孩）· 进入经典风味请帖</span>
    </button>
  </div>
</div>

<!-- 低调奢华·经典风味请帖（暗夜流光） -->
<div id="lux"><canvas id="luxFx"></canvas><div class="lux-inner" id="luxInner"></div></div>
<div id="luxBox"><img id="luxBoxImg" alt=""><button id="luxBoxClose">✕</button></div>

<!-- HUD -->
<div id="hud">
  <div id="questBar"><span class="dot"></span><span id="questText">…</span></div>
  <div id="itemBar"></div>
  <div id="progress"></div>
  <div id="menuBtns">
    <button class="mini-btn" id="bgmBtn">♪</button>
    <button class="mini-btn" id="bookBtn">📜</button>
    <button class="mini-btn" id="setBtn">⚙</button>
  </div>
</div>
<div id="edgeArrow"></div>

<!-- 触屏控件 -->
<div id="padL"><div id="stickBase"><div id="stickNub"></div></div></div>
<div id="padHint"><div id="padRing"><div id="padDot"></div></div><div id="padHintTxt">拖动这里移动</div></div>
<div id="toolBar"></div>
<div id="btns">
  <button class="act-btn b" id="btnB">B<br>跳</button>
  <button class="act-btn" id="btnA">A<br>互动</button>
</div>

<!-- 对话框 -->
<div id="dialog">
  <div class="box" id="dlgBox">
    <div id="dlgPortrait"><canvas width="64" height="64"></canvas></div>
    <div id="dlgMain">
      <div id="dlgName"></div>
      <div id="dlgText"></div>
      <div id="dlgChoices"></div>
    </div>
    <div id="dlgNext">▼</div>
  </div>
</div>

<!-- 浮层 -->
<div id="overlay"><div id="overlayCard" class="sdv-panel"><div class="inner" id="overlayInner"></div></div></div>

<!-- 钓鱼小游戏 -->
<div id="fishUI">
  <div id="fishTrack"><div id="fishZone"></div><div id="fishIcon">🐟</div></div>
  <div id="fishSide"><div id="fishProgWrap"><div id="fishProg"></div></div></div>
</div>
<div id="fishHint">按住 A：绿色区域上移<br>让绿区罩住小鱼，攒满进度！</div>

<div id="toasts"></div>
<div id="fade"></div>

<!-- 模块按依赖顺序加载（经典脚本共享全局作用域，零构建、可 file:// 直开） -->
<script src="js/config.js"></script>
<script src="js/assets.js"></script>
<script src="js/scene.js"></script>
<script src="js/core.js"></script>
<script src="js/play.js"></script>
<script src="js/render.js"></script>
<script src="js/interior.js"></script>
<script src="js/hud.js"></script>
<script src="js/invite.js"></script>
<script src="js/interact.js"></script>
<script src="js/scenefx.js"></script>
<script src="js/boot.js"></script>
</body>
</html>
